site_name: Haikara Wiki
site_description: Persönliches Wissens-Wiki

theme:
  name: material
  custom_dir: docs/overrides
  language: de
  font:
    text: Syne
    code: JetBrains Mono
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: de

nav:
  - Start: index.md
  - Berufsschule:
    - berufsschule/index.md
    - Netzwerktechnik: berufsschule/netzwerk.md
  - Notizen:
    - notizen/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
